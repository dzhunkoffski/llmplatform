version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - llm_network

  balancer:
    build: .
    container_name: llm_balancer
    ports:
      - "8000:8000"
      # Порт метрик наружу пробрасывать не обязательно, Prometheus внутри сети Docker
    environment:
      - ADMIN_KEY=${ADMIN_KEY}
    depends_on:
      provider-1:
        condition: service_healthy # Ждем, пока провайдер станет здоров
      provider-2:
        condition: service_healthy
      redis:
        condition: service_healthy
    # ДОБАВЛЯЕМ HEALTHCHECK
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - llm_network

  provider-1:
    image: ollama/ollama:latest
    container_name: provider-1
    volumes:
      - ollama_data:/root/.ollama
    # ДОБАВЛЯЕМ HEALTHCHECK (Ollama отвечает на GET /)
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - llm_network

  provider-2:
    image: ollama/ollama:latest
    container_name: provider-2
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - llm_network

  # НОВЫЙ СЕРВИС: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring_config/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090" # Админка Prometheus
    networks:
      - llm_network

  # НОВЫЙ СЕРВИС: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000" # Веб-интерфейс Grafana
    volumes:
      - ./monitoring_config/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - llm_network

  ollama-init:
    image: ollama/ollama:latest
    container_name: mock_llm_init
    depends_on:
      provider-1:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=provider-1:11434
    command: pull qwen:0.5b
    networks:
      - llm_network

volumes:
  ollama_data:
  redis_data:

    # Явно определяем сеть, чтобы контейнеры видели друг друга по именам
networks:
  llm_network:
    driver: bridge
